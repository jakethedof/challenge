# ── Staging overrides ─────────────────────────────────────────────────────
# Two replicas to validate HA behaviour before prod; INFO logging.

replicaCount: 2

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: staging
  - name: LOGGING_LEVEL_ROOT
    value: INFO
