# ── Production overrides ──────────────────────────────────────────────────
# Full resources, HPA enabled, WARN logging to reduce noise/cost.

replicaCount: 3

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod
  - name: LOGGING_LEVEL_ROOT
    value: WARN
