# ── Development overrides ──────────────────────────────────────────────────
# Minimal resources, debug logging, no autoscaling.

replicaCount: 1

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 125m
    memory: 128Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev
  - name: LOGGING_LEVEL_ROOT
    value: DEBUG
